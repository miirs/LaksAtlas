name: Deploy to GitHub Pages

# Trigger on every push to main (including auto-data commits above)
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # The site HTML lives in site/ and references data via '../data/'.
      # On GitHub Pages both are served from the same root, so rewrite
      # '../data/' → 'data/' in the deployed copies only (local dev unaffected).
      - name: Prepare site artifact
        run: |
          cp -r site/. _deploy/
          cp -r data   _deploy/data
          cp -r logo   _deploy/logo
          find _deploy -name '*.html' -exec sed -i 's|\.\./data/|data/|g' {} +
          find _deploy -name '*.html' -exec sed -i 's|\.\./logo/|logo/|g' {} +

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
